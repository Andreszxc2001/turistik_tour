  <script>
    // Mapeo de slugs a nombres de archivos JSON
    const slugToFileMap = {
      'riohacha-la-guajira': 'Riohacha.json',
      'cabo-de-la-vela-la-guajira': 'Cabo_de_la_Vela.json',
      'punta-gallinas-la-guajira': 'Punta_Gallinas.json',
      'dunas-de-taroa-punta-gallinas': 'Dunas_de_Taroa.json',
      'faro-punta-gallinas': 'Faro_Punta_Gallinas.json',
      'pilon-de-azucar-cabo-de-la-vela': 'Pilón_de_Azucar.json',
      'playa-arcoiris-cabo-de-la-vela': 'Playa_Arcoíris.json',
      'bahia-portete-la-guajira': 'Bahía_Portete.json',
      'santuario-los-flamencos-la-guajira': 'Santuario_Flamencos.json'
    };

    // Cargar configuración global desde body.json
    async function loadSiteConfig() {
      try {
        const response = await fetch('data/body.json');
        const data = await response.json();
        
        // Actualizar navbar
        document.getElementById('navbar-brand').textContent = data.site_config.identidad.nombre_sitio;
        
        const navbarMenu = document.getElementById('navbar-menu');
        navbarMenu.innerHTML = '';
        
        data.site_config.navegacion.menu_principal.forEach(item => {
          const li = document.createElement('li');
          li.className = 'nav-item';
          if (item.activo && item.id === 'destinos') {
            li.classList.add('active');
          }
          
          const a = document.createElement('a');
          a.className = 'nav-link';
          a.href = item.ruta;
          a.textContent = item.label;
          
          li.appendChild(a);
          navbarMenu.appendChild(li);
        });
        
        // CTA button
        const ctaLi = document.createElement('li');
        ctaLi.className = 'nav-item cta';
        const ctaA = document.createElement('a');
        ctaA.className = 'nav-link';
        ctaA.href = data.site_config.navegacion.cta_header.ruta;
        ctaA.innerHTML = `<span>${data.site_config.navegacion.cta_header.label}</span>`;
        ctaLi.appendChild(ctaA);
        navbarMenu.appendChild(ctaLi);
        
        // Actualizar footer
        document.getElementById('footer-brand').textContent = data.site_config.identidad.nombre_sitio;
        document.getElementById('footer-description').textContent = data.site_config.identidad.descripcion_meta;
        
        // Footer social media
        const footerSocial = document.getElementById('footer-social');
        footerSocial.innerHTML = '';
        
        if (data.site_config.redes_sociales.instagram) {
          const li = document.createElement('li');
          li.className = 'ftco-animate';
          const a = document.createElement('a');
          a.href = data.site_config.redes_sociales.instagram.url;
          a.innerHTML = '<span class="icon-instagram"></span>';
          li.appendChild(a);
          footerSocial.appendChild(li);
        }
        
        if (data.site_config.redes_sociales.facebook) {
          const li = document.createElement('li');
          li.className = 'ftco-animate';
          const a = document.createElement('a');
          a.href = data.site_config.redes_sociales.facebook.url;
          a.innerHTML = '<span class="icon-facebook"></span>';
          li.appendChild(a);
          footerSocial.appendChild(li);
        }
        
        if (data.site_config.redes_sociales.tiktok) {
          const li = document.createElement('li');
          li.className = 'ftco-animate';
          const a = document.createElement('a');
          a.href = data.site_config.redes_sociales.tiktok.url;
          a.innerHTML = '<span class="icon-twitter"></span>';
          li.appendChild(a);
          footerSocial.appendChild(li);
        }
        
        // Footer column 1 - Destinos
        document.getElementById('footer-col1-title').textContent = data.site_config.navegacion.footer_links.columna_1.titulo;
        const footerCol1 = document.getElementById('footer-col1-links');
        footerCol1.innerHTML = '';
        data.site_config.navegacion.footer_links.columna_1.links.forEach(link => {
          const li = document.createElement('li');
          const a = document.createElement('a');
          a.href = link.ruta;
          a.className = 'py-2 d-block';
          a.textContent = link.label;
          li.appendChild(a);
          footerCol1.appendChild(li);
        });
        
        // Footer column 2 - Empresa
        document.getElementById('footer-col2-title').textContent = data.site_config.navegacion.footer_links.columna_2.titulo;
        const footerCol2 = document.getElementById('footer-col2-links');
        footerCol2.innerHTML = '';
        data.site_config.navegacion.footer_links.columna_2.links.forEach(link => {
          const li = document.createElement('li');
          const a = document.createElement('a');
          a.href = link.ruta;
          a.className = 'py-2 d-block';
          a.textContent = link.label;
          li.appendChild(a);
          footerCol2.appendChild(li);
        });
        
        // Footer column 3 - Legal
        document.getElementById('footer-col3-title').textContent = data.site_config.navegacion.footer_links.columna_3.titulo;
        const footerCol3 = document.getElementById('footer-col3-links');
        footerCol3.innerHTML = '';
        data.site_config.navegacion.footer_links.columna_3.links.forEach(link => {
          const li = document.createElement('li');
          const a = document.createElement('a');
          a.href = link.ruta;
          a.className = 'py-2 d-block';
          a.textContent = link.label;
          li.appendChild(a);
          footerCol3.appendChild(li);
        });
        
        // Footer copyright
        document.getElementById('footer-copyright').innerHTML = data.site_config.copyright.texto;
        
      } catch (error) {
        console.error('Error loading site config:', error);
      }
    }
    
    // Cargar destino específico
    async function loadDestination() {
      // Obtener parámetro de URL
      const urlParams = new URLSearchParams(window.location.search);
      const destinoSlug = urlParams.get('destino');
      
      if (!destinoSlug) {
        document.getElementById('destination-detail').innerHTML = '<p class="text-center">No se especificó un destino.</p>';
        return;
      }
      
      // Obtener nombre del archivo JSON
      const jsonFile = slugToFileMap[destinoSlug];
      
      if (!jsonFile) {
        document.getElementById('destination-detail').innerHTML = '<p class="text-center">Destino no encontrado.</p>';
        return;
      }
      
      try {
        const response = await fetch(`data/${jsonFile}`);
        const data = await response.json();
        
        if (!data || !data[0]) {
          document.getElementById('destination-detail').innerHTML = '<p class="text-center">No se encontraron datos del destino.</p>';
          return;
        }
        
        const dest = data[0];
        
        // Actualizar meta tags
        document.getElementById('page-title').textContent = dest.seo.titulo;
        document.getElementById('page-description').textContent = dest.seo.descripcion;
        
        // Actualizar hero
        document.getElementById('breadcrumb-destination').textContent = dest.nombre;
        document.getElementById('hero-title').textContent = dest.nombre;
        
        // Renderizar detalle del destino
        const detailContainer = document.getElementById('destination-detail');
        detailContainer.innerHTML = `
          <div class="row">
            <div class="col-md-12 ftco-animate">
              <div class="destination">
                <a href="#" class="img img-2 d-flex justify-content-center align-items-center" style="background-image: url('images/destination-1.jpg');">
                  <div class="icon d-flex justify-content-center align-items-center">
                    <span class="icon-search2"></span>
                  </div>
                </a>
                <div class="text p-3">
                  <div class="d-flex">
                    <div class="one">
                      <h3>${dest.nombre}</h3>
                      <p class="rate">
                        <i class="icon-star"></i>
                        <i class="icon-star"></i>
                        <i class="icon-star"></i>
                        <i class="icon-star"></i>
                        <i class="icon-star"></i>
                        <span>5.0</span>
                      </p>
                    </div>
                    <div class="two">
                      <span class="price">${dest.precio_ingreso.valor ? '$' + dest.precio_ingreso.valor : 'Consultar'}</span>
                    </div>
                  </div>
                  <p>${dest.descripcion_corta}</p>
                  <p class="days"><span>${dest.duracion_recomendada}</span></p>
                  <hr>
                  <p class="bottom-area d-flex">
                    <span><i class="icon-map-o"></i> ${dest.ubicacion.municipio}, ${dest.ubicacion.departamento}</span>
                    <span class="ml-auto"><a href="contact.html">Reservar</a></span>
                  </p>
                </div>
              </div>
            </div>
          </div>
          
          <div class="row mt-5">
            <div class="col-md-12">
              <h3>Descripción</h3>
              <p>${dest.descripcion_larga}</p>
            </div>
          </div>
          
          <div class="row mt-5">
            <div class="col-md-6">
              <h3>Historia</h3>
              <p>${dest.historia}</p>
            </div>
            <div class="col-md-6">
              <h3>Cultura</h3>
              <p>${dest.cultura}</p>
            </div>
          </div>
          
          <div class="row mt-5">
            <div class="col-md-6">
              <h3>Clima</h3>
              <p>${dest.clima.descripcion}</p>
              <p><strong>Temperatura promedio:</strong> ${dest.clima.temperatura_promedio}</p>
              <p><strong>Mejor época:</strong> ${dest.clima.mejor_epoca}</p>
            </div>
            <div class="col-md-6">
              <h3>Ubicación</h3>
              <p><strong>Municipio:</strong> ${dest.ubicacion.municipio}</p>
              <p><strong>Departamento:</strong> ${dest.ubicacion.departamento}</p>
              <p><strong>País:</strong> ${dest.ubicacion.pais}</p>
            </div>
          </div>
          
          <div class="row mt-5">
            <div class="col-md-6">
              <h3>Actividades</h3>
              <ul>
                ${dest.actividades.map(act => `<li>${act}</li>`).join('')}
              </ul>
            </div>
            <div class="col-md-6">
              <h3>Atracciones</h3>
              <ul>
                ${dest.atracciones.map(attr => `<li>${attr}</li>`).join('')}
              </ul>
            </div>
          </div>
          
          <div class="row mt-5">
            <div class="col-md-6">
              <h3>Gastronomía</h3>
              <ul>
                ${dest.gastronomia.map(gast => `<li>${gast}</li>`).join('')}
              </ul>
            </div>
            <div class="col-md-6">
              <h3>Consejos</h3>
              <ul>
                ${dest.consejos.map(con => `<li>${con}</li>`).join('')}
              </ul>
            </div>
          </div>
          
          <div class="row mt-5">
            <div class="col-md-12">
              <h3>Cómo llegar</h3>
              <p>${dest.como_llegar}</p>
            </div>
          </div>
          
          <div class="row mt-5">
            <div class="col-md-6">
              <h3>Horarios</h3>
              <p>${dest.horarios}</p>
            </div>
            <div class="col-md-6">
              <h3>Precio de ingreso</h3>
              <p>${dest.precio_ingreso.valor ? '$' + dest.precio_ingreso.valor + ' ' + dest.precio_ingreso.moneda : dest.precio_ingreso.observaciones}</p>
              <p><small>${dest.precio_ingreso.observaciones}</small></p>
            </div>
          </div>
          
          <div class="row mt-5">
            <div class="col-md-12">
              <h3>Curiosidades</h3>
              <ul>
                ${dest.curiosidades.map(cur => `<li>${cur}</li>`).join('')}
              </ul>
            </div>
          </div>
        `;
        
      } catch (error) {
        console.error('Error loading destination:', error);
        document.getElementById('destination-detail').innerHTML = '<p class="text-center">Error al cargar el destino.</p>';
      }
    }
    
    // Inicializar
    document.addEventListener('DOMContentLoaded', function() {
      loadSiteConfig();
      loadDestination();
    });
  </script>
    
  </body>
